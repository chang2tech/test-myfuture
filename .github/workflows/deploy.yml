# ============================================================
# myFUTURE — CI/CD Pipeline (Staging VPS)
#
# Trigger: push to main branch (or manual dispatch)
# Flow:
#   1. type-check    — tsc --noEmit trên cả server + client
#   2. build-push    — build Docker images → push lên GHCR
#   3. deploy        — SSH vào VPS, pull images mới, migrate DB, restart containers
#
# GitHub Secrets (Settings → Secrets → Actions):
#   VPS_HOST             116.118.6.129
#   VPS_USER             Linux user có quyền run docker (vd: root, deploy)
#   VPS_SSH_KEY          Private SSH key (ed25519 hoặc RSA)
#   VPS_SSH_PORT         SSH port (mặc định 22)
#   NEXT_PUBLIC_SITE_URL   https://myfuture.changtotech.click
#   NEXT_PUBLIC_API_ORIGIN https://myfuture.changtotech.click
#   NEXT_PUBLIC_API_URL    https://myfuture.changtotech.click/api
#
# GitHub Variables (Settings → Variables → Actions):
#   IMAGE_REGISTRY       ghcr.io/chang2tech
# ============================================================

name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip type checks (emergency deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}
  STAGING_SITE_URL: https://myfuture.changtotech.click
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-server-

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Server — prisma generate
        run: npx prisma generate --schema=prisma/schema.prisma
        working-directory: server

      - name: Server — tsc --noEmit
        run: npx tsc --noEmit
        working-directory: server

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-client-

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Client — tsc --noEmit
        run: npx tsc --noEmit
        working-directory: client

  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [type-check]
    if: always() && (needs.type-check.result == 'success' || needs.type-check.result == 'skipped')

    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image version (short SHA)
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve client public URL build-args
        id: public-url
        env:
          SITE_URL_SECRET: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          API_URL_SECRET: ${{ secrets.NEXT_PUBLIC_API_URL }}
          API_ORIGIN_SECRET: ${{ secrets.NEXT_PUBLIC_API_ORIGIN }}
        run: |
          SITE_URL="${SITE_URL_SECRET:-$STAGING_SITE_URL}"
          API_ORIGIN="${API_ORIGIN_SECRET:-$SITE_URL}"
          API_URL="${API_URL_SECRET:-${API_ORIGIN%/}/api}"
          if [ -z "$SITE_URL" ]; then
            echo "::error::NEXT_PUBLIC_SITE_URL secret is empty"
            exit 1
          fi
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"
          echo "api_origin=$API_ORIGIN" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "Building client with SITE_URL=$SITE_URL"

      - name: Build & push — server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/myfuture-server:${{ steps.version.outputs.sha }}
            ${{ env.IMAGE_REGISTRY }}/myfuture-server:latest
          cache-from: type=gha,scope=myfuture-server
          cache-to: type=gha,scope=myfuture-server,mode=max
          provenance: false

      - name: Build & push — client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.public-url.outputs.api_url }}
            NEXT_PUBLIC_API_ORIGIN=${{ steps.public-url.outputs.api_origin }}
            NEXT_PUBLIC_SITE_URL=${{ steps.public-url.outputs.site_url }}
          tags: |
            ${{ env.IMAGE_REGISTRY }}/myfuture-client:${{ steps.version.outputs.sha }}
            ${{ env.IMAGE_REGISTRY }}/myfuture-client:latest
          cache-from: type=gha,scope=myfuture-client
          cache-to: type=gha,scope=myfuture-client,mode=max
          provenance: false

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-push]
    permissions:
      contents: read
      packages: read
    environment:
      name: staging
      url: https://myfuture.changtotech.click

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 120s
          script: |
            set -euo pipefail

            APP_DIR=/opt/myfuture
            APP_VERSION=${{ needs.build-push.outputs.version }}
            IMAGE_REGISTRY=${{ env.IMAGE_REGISTRY }}
            SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://myfuture.changtotech.click' }}
            REPO_URL=https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/chang2tech/test-myfuture.git

            echo "▶ Checking disk usage before deploy..."
            df -h /

            echo "▶ Cleaning up safe Docker artifacts..."
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true

            MIN_FREE_KB=1572864
            FREE_KB=$(df --output=avail / | tail -n1 | tr -d ' ')
            if [ "$FREE_KB" -lt "$MIN_FREE_KB" ]; then
              echo "❌ Not enough disk space (need ~1.5GB free)."
              df -h /
              exit 1
            fi

            echo "▶ Pulling latest config from git..."
            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            rm -f .git/config.lock
            git pull "$REPO_URL" main --ff-only

            if [ ! -f .env ]; then
              cp .env.staging.example .env
              echo "❌ Created .env from .env.staging.example — set secrets on VPS then re-run deploy."
              exit 1
            fi

            set_env() {
              KEY="$1"
              VALUE="$2"
              if grep -q "^${KEY}=" .env; then
                sed -i "s|^${KEY}=.*|${KEY}=${VALUE}|" .env
              else
                echo "${KEY}=${VALUE}" >> .env
              fi
            }

            echo "▶ Syncing staging URLs..."
            set_env "CLIENT_URL" "$SITE_URL"
            set_env "CORS_ORIGINS" "$SITE_URL"
            set_env "NEXT_PUBLIC_SITE_URL" "$SITE_URL"
            set_env "NEXT_PUBLIC_API_ORIGIN" "$SITE_URL"
            set_env "NEXT_PUBLIC_API_URL" "${SITE_URL%/}/api"
            set_env "API_URL" "http://server:4721/api"
            set_env "NODE_ENV" "production"
            set_env "IMAGE_REGISTRY" "$IMAGE_REGISTRY"
            set_env "NGINX_PORT" "8090"

            echo "▶ Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "▶ Pulling new images (version: $APP_VERSION)..."
            APP_VERSION="$APP_VERSION" IMAGE_REGISTRY="$IMAGE_REGISTRY" \
              docker compose -f docker-compose.prod.yml pull server client

            echo "▶ Running database migrations..."
            APP_VERSION="$APP_VERSION" IMAGE_REGISTRY="$IMAGE_REGISTRY" \
              docker compose -f docker-compose.prod.yml run --rm migrate

            echo "▶ Restarting services..."
            APP_VERSION="$APP_VERSION" IMAGE_REGISTRY="$IMAGE_REGISTRY" \
              docker compose -f docker-compose.prod.yml up -d \
                --no-deps --remove-orphans \
                server client nginx

            echo "▶ Recreating nginx..."
            APP_VERSION="$APP_VERSION" IMAGE_REGISTRY="$IMAGE_REGISTRY" \
              docker compose -f docker-compose.prod.yml up -d --force-recreate nginx

            echo "▶ Waiting for server health check..."
            for i in $(seq 1 12); do
              if docker exec myfuture_server \
                  wget -qO- http://127.0.0.1:4721/api/health > /dev/null 2>&1; then
                echo "✅ Server healthy"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "❌ Health check failed after 60s"
                docker compose -f docker-compose.prod.yml logs --tail=50 server
                exit 1
              fi
              echo "  Waiting... ($i/12)"
              sleep 5
            done

            docker image prune -f
            echo "✅ Deploy complete — version: $APP_VERSION — $SITE_URL"
